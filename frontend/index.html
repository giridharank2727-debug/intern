<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GigIntern</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
      color: #0f172a;
    }

    .card {
      width: min(520px, 100%);
      background: white;
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      text-align: center;
      border: 1px solid rgba(148, 163, 184, 0.15);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.05em;
    }

    p {
      color: #475569;
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.75rem;
      border-radius: 14px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: #1d4ed8;
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      flex: 1 1 180px;
      max-width: 220px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to GigIntern</h1>
    <p>Organize your internship applications, browse opportunities, and keep your account secure with a simple, neat interface.</p>
    <div class="links">
      <a class="button" href="login.html">Sign In</a>
      <a class="button" href="register.html">Register</a>
    </div>
  </div>
</body>
</html>
