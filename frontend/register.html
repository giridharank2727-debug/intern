<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | GigIntern</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1rem;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.dark {
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }

    .card {
      width: min(420px, 100%);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(148, 163, 184, 0.15);
      padding: 2.25rem;
      position: relative;
    }

    body.dark .card {
      background: #1e293b;
      border-color: rgba(148, 163, 184, 0.2);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.2);
    }

    .brand {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #1d4ed8;
      margin-bottom: 0.25rem;
    }

    body.dark .brand {
      color: #93c5fd;
    }

    .subtitle {
      margin-bottom: 1.75rem;
      color: #475569;
      line-height: 1.6;
    }

    body.dark .subtitle {
      color: #cbd5e1;
    }

    .theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: transparent;
      color: inherit;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .theme-toggle:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.7);
    }

    .field {
      display: grid;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .field label {
      font-size: 0.9rem;
      color: #475569;
    }

    body.dark .field label {
      color: #cbd5e1;
    }

    .field input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 0.95rem 1rem;
      font-size: 1rem;
      color: inherit;
      background: #f8fafc;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    body.dark .field input {
      background: #0f172a;
      border-color: #334155;
    }

    .field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: #1d4ed8;
    }

    .message {
      display: none;
      padding: 0.95rem 1rem;
      border-radius: 14px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .footer {
      margin-top: 1.5rem;
      color: #475569;
      text-align: center;
      font-size: 0.95rem;
    }

    .footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    body.dark .footer {
      color: #cbd5e1;
    }

    body.dark .footer a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="card">
    <button class="theme-toggle" id="themeToggleBtn" aria-label="Toggle theme">🌙</button>
    <div class="brand">GigIntern</div>
    <p class="subtitle">Create your account and start tracking internships in one clean dashboard.</p>

    <div id="message" class="message"></div>

    <form id="registerForm">
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" type="text" placeholder="Your name" required />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="button">Create Account</button>
    </form>

    <p class="footer">Already registered? <a href="login.html">Sign in</a>.</p>
  </div>

  <script>
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const messageEl = document.getElementById('message');

    function applyTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
      themeToggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
    }

    function loadTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      applyTheme(saved);
    }

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = `message show ${type}`;
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!name || !email || !password) {
        showMessage('All fields are required.', 'error');
        return;
      }

      const button = event.target.querySelector('.button');
      button.disabled = true;
      button.textContent = 'Creating account...';

      try {
        const response = await fetch('http://localhost:5000/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await response.json();
        if (data.success) {
          showMessage('Account created. Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'login.html', 1400);
        } else {
          showMessage(data.message || 'Registration failed.', 'error');
        }
      } catch (error) {
        showMessage('Cannot reach server. Start backend and retry.', 'error');
      } finally {
        button.disabled = false;
        button.textContent = 'Create Account';
      }
    }

    themeToggleBtn.addEventListener('click', () => {
      applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
    });

    document.getElementById('registerForm').addEventListener('submit', handleSubmit);
    loadTheme();
  </script>
</body>
</html>
